<body>
    <div class="body">
        <div class="overlay" id="overlay"></div>

        <div class="modal">
            <img class="modal__img close" src="./assets/images/close.svg" />

            <div class="modal__text-wrapper">
                <img class="modal__img bell" src="./assets/images/bell.svg" />

                <p class="modal__text" data-translate="install_app_and_continue_watching">
                    Install our app and continue watching content in Safe mode
                </p>
            </div>

            <div class="modal__btns">
                <button class="button" data-translate="no">
                    No
                </button>
                <button class="button button--primary" data-translate="yes">
                    Yes
                </button>
            </div>
        </div>

        <div class="toolbar">
            <div class="progress">
                <div class="bar"></div>
            </div>

            <div class="controls">
                <img src="./assets/images/play.svg" class="control-img" />

                <img src="./assets/images/next.svg" class="control-img" />

                <img src="./assets/images/sound.svg" class="control-img" />

                <div class="time">0:11 / 1:38</div>
            </div>

            <div class="settings">
                <img src="./assets/images/settings.svg" class="control-img" />

                <img src="./assets/images/screen.svg" class="control-img" />

                <img src="./assets/images/fullScreen.svg" class="control-img" />
            </div>
        </div>
    </div>
